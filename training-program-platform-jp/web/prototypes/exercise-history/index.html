<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>種目単体履歴</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- =====================================================
     ヘッダー（固定）
     戻る / 種目名 / タイプバッジ
===================================================== -->
<header class="page-header">
  <button class="btn-back" id="btn-back">
    <span class="back-arrow">←</span>
    <span class="back-label">戻る</span>
  </button>
  <div class="header-center">
    <span class="type-badge" id="type-badge">T1</span>
    <span class="exercise-title" id="exercise-title">Bench Press</span>
  </div>
  <div class="header-right"><!-- スペーサー --></div>
</header>

<!-- =====================================================
     メインコンテンツ
===================================================== -->
<main class="main-content">

  <!-- サマリーエリア（最新記録の即時確認） -->
  <section class="summary-section" id="summary-section">
    <div class="summary-latest-date" id="summary-date">最新: 2026-04-01</div>
    <div class="summary-sets" id="summary-sets">80kg×3, 80kg×3, 80kg×7</div>
    <div class="summary-program" id="summary-program">GZCLP Week 8 Day 1</div>
  </section>

  <!-- Previous の根拠ヒント -->
  <div class="prev-hint" id="prev-hint">
    <span class="prev-hint-icon">ℹ</span>
    Previous は直近の完了セットを参照して表示しています
  </div>

  <!-- 履歴一覧エリア（新しい順） -->
  <section class="history-list" id="history-list">
    <!-- JS で動的生成 -->
  </section>

  <!-- 初回・記録なし表示 -->
  <div class="empty-state" id="empty-state" hidden>
    <div class="empty-icon">📋</div>
    <p class="empty-title">まだ記録がありません</p>
    <p class="empty-sub">ワークアウトを完了すると、<br>ここに履歴が表示されます</p>
  </div>

</main>

<script src="script.js"></script>
</body>
</html>
