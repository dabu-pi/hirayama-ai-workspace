<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ワイルドボア会員管理</title>
  <!-- TODO: Phase 2 以降でスタイルを実装する -->
  <style>
    /* 共通レイアウトスタイル */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      font-size: 16px;
      background-color: #f5f5f5;
      color: #333;
    }
    header {
      background-color: #1a1a2e;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 18px;
    }
    nav {
      background-color: #16213e;
      padding: 0 24px;
    }
    nav a {
      display: inline-block;
      color: #ccc;
      text-decoration: none;
      padding: 12px 16px;
      font-size: 14px;
    }
    nav a:hover, nav a.active {
      color: #fff;
      border-bottom: 3px solid #e94560;
    }
    main {
      max-width: 1024px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .card {
      background-color: #fff;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 16px;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-primary {
      background-color: #e94560;
      color: #fff;
    }
    .btn-secondary {
      background-color: #6c757d;
      color: #fff;
    }
    .btn-success {
      background-color: #28a745;
      color: #fff;
    }
    /* タブレット最適化 */
    @media (max-width: 768px) {
      body { font-size: 18px; }
      .btn { padding: 14px 28px; font-size: 18px; }
    }
  </style>
</head>
<body>
  <!-- TODO: Phase 2 以降でヘッダー・ナビゲーションを実装する -->
  <header>
    <h1>トレーニングジム ワイルドボア</h1>
  </header>
  <!-- ページコンテンツはここにincludeされる -->
</body>
</html>
