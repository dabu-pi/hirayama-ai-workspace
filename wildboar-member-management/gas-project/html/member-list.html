<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>申込一覧 — ワイルドボア会員管理</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      font-size: 15px;
      background: #f4f6f9;
      color: #333;
    }

    .app-header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .app-header h1 { font-size: 16px; font-weight: bold; flex: 1; }
    .header-nav a {
      color: #aaa; font-size: 13px; text-decoration: none; margin-left: 12px;
      cursor: pointer;
    }
    .header-nav a:hover { color: #fff; }

    .container { max-width: 1100px; margin: 0 auto; padding: 20px 16px 60px; }

    .page-title {
      font-size: 20px; font-weight: bold; color: #1a1a2e;
      margin-bottom: 16px;
    }

    /* フィルタバー */
    .filter-bar {
      display: flex; align-items: center; gap: 8px;
      background: #fff; border-radius: 10px; padding: 12px 16px;
      margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.07);
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 8px 16px; border-radius: 6px; border: 2px solid #dde3ea;
      background: #fff; color: #555; cursor: pointer; font-size: 14px;
      font-family: inherit; display: flex; align-items: center; gap: 6px;
      transition: all .2s;
    }
    .tab-btn.active {
      border-color: #e94560; background: #fff0f2; color: #e94560; font-weight: bold;
    }
    .badge {
      background: #dde3ea; color: #555; font-size: 12px; font-weight: bold;
      border-radius: 10px; padding: 1px 8px; min-width: 22px; text-align: center;
    }
    .badge.pend { background: #e94560; color: #fff; }

    .refresh-btn {
      margin-left: auto; padding: 8px 14px; border-radius: 6px;
      border: 1px solid #dde3ea; background: #f0f3f7; color: #555;
      cursor: pointer; font-size: 13px; font-family: inherit;
    }
    .refresh-btn:hover { background: #e8ecf0; }

    /* テーブル */
    .table-wrap {
      background: #fff; border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07); overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: #f0f3f7; text-align: left;
      padding: 12px 16px; font-size: 13px; color: #666; font-weight: bold;
      border-bottom: 1px solid #e0e5ea; white-space: nowrap;
    }
    td {
      padding: 13px 16px; font-size: 14px; border-bottom: 1px solid #f0f3f7;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbfc; }

    .app-id { font-family: monospace; font-size: 12px; color: #888; }
    .date-cell { font-size: 13px; color: #666; white-space: nowrap; }
    .name-cell { font-weight: bold; }

    /* ステータスバッジ */
    .status-badge {
      display: inline-block; padding: 3px 10px; border-radius: 10px;
      font-size: 12px; font-weight: bold; white-space: nowrap;
    }
    .s-pending  { background: #fff3cd; color: #856404; }
    .s-approved { background: #d4edda; color: #155724; }
    .s-rejected { background: #f8d7da; color: #721c24; }

    /* アクションボタン */
    .btn-act {
      padding: 7px 14px; border-radius: 6px; border: none;
      font-size: 13px; font-family: inherit; cursor: pointer;
      font-weight: bold; transition: opacity .2s; white-space: nowrap;
    }
    .btn-act:hover { opacity: .85; }
    .btn-primary   { background: #e94560; color: #fff; }
    .btn-secondary { background: #f0f0f0; color: #555; }

    /* 状態メッセージ */
    .state-msg {
      text-align: center; padding: 48px 20px; color: #999; font-size: 15px;
    }
    .spinner-wrap { text-align: center; padding: 48px 20px; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #ddd;
      border-top-color: #e94560; border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .hide-sp { display: none; }
    }
  </style>
</head>
<body>

<header class="app-header">
  <h1>ワイルドボア 会員管理システム</h1>
  <nav class="header-nav">
    <a onclick="goHome()">ホームへ戻る</a>
  </nav>
</header>

<div class="container">
  <p class="page-title">入会申込一覧</p>

  <div class="filter-bar">
    <button class="tab-btn active" data-filter="all" onclick="setFilter('all')">
      すべて <span class="badge" id="badge-all">0</span>
    </button>
    <button class="tab-btn" data-filter="pending" onclick="setFilter('pending')">
      未確認 <span class="badge pend" id="badge-pending">0</span>
    </button>
    <button class="tab-btn" data-filter="approved" onclick="setFilter('approved')">
      承認済み <span class="badge" id="badge-approved">0</span>
    </button>
    <button class="tab-btn" data-filter="rejected" onclick="setFilter('rejected')">
      差し戻し <span class="badge" id="badge-rejected">0</span>
    </button>
    <button class="refresh-btn" onclick="loadApplications()">↺ 再読み込み</button>
  </div>

  <div class="table-wrap">
    <div class="spinner-wrap" id="loadingMsg">
      <div class="spinner"></div>
      <p style="color:#999;font-size:14px;">読み込んでいます...</p>
    </div>
    <p class="state-msg" id="noDataMsg" style="display:none">該当する申込はありません</p>
    <p class="state-msg" id="errorMsg"  style="display:none;color:#e94560;"></p>

    <table id="dataTable" style="display:none">
      <thead>
        <tr>
          <th>受付番号</th>
          <th class="hide-sp">申込日時</th>
          <th>氏名</th>
          <th class="hide-sp">希望コース</th>
          <th>ステータス</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
var allData      = [];
var currentFilter = 'all';

document.addEventListener('DOMContentLoaded', function() {
  loadApplications();
});

function loadApplications() {
  resetView();
  google.script.run
    .withSuccessHandler(onLoaded)
    .withFailureHandler(onError)
    .getIntakeApplications();
}

function onLoaded(data) {
  allData = data || [];
  updateBadges();
  renderTable();
}

function onError() {
  document.getElementById('loadingMsg').style.display = 'none';
  var m = document.getElementById('errorMsg');
  m.textContent = '読み込みに失敗しました。ページを更新してください。';
  m.style.display = 'block';
}

function resetView() {
  document.getElementById('loadingMsg').style.display = 'block';
  document.getElementById('dataTable').style.display  = 'none';
  document.getElementById('noDataMsg').style.display  = 'none';
  document.getElementById('errorMsg').style.display   = 'none';
  document.getElementById('tableBody').innerHTML       = '';
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.getAttribute('data-filter') === filter);
  });
  renderTable();
}

function updateBadges() {
  var c = { all: allData.length, pending: 0, approved: 0, rejected: 0 };
  allData.forEach(function(a) { if (c[a.review_status] !== undefined) c[a.review_status]++; });
  document.getElementById('badge-all').textContent      = c.all;
  document.getElementById('badge-pending').textContent  = c.pending;
  document.getElementById('badge-approved').textContent = c.approved;
  document.getElementById('badge-rejected').textContent = c.rejected;
}

function renderTable() {
  var filtered = currentFilter === 'all'
    ? allData
    : allData.filter(function(a) { return a.review_status === currentFilter; });

  document.getElementById('loadingMsg').style.display = 'none';

  if (filtered.length === 0) {
    document.getElementById('dataTable').style.display = 'none';
    document.getElementById('noDataMsg').style.display = 'block';
    return;
  }

  document.getElementById('noDataMsg').style.display = 'none';
  document.getElementById('dataTable').style.display = 'table';

  document.getElementById('tableBody').innerHTML = filtered.map(function(a) {
    var statusBadge = makeStatusBadge(a.review_status);
    var btn = a.review_status === 'pending'
      ? '<button class="btn-act btn-primary" onclick="goToDetail(\'' + esc(a.application_id) + '\')">確認する</button>'
      : '<button class="btn-act btn-secondary" onclick="goToDetail(\'' + esc(a.application_id) + '\')">詳細</button>';
    return '<tr>'
      + '<td class="app-id">' + esc(a.application_id) + '</td>'
      + '<td class="date-cell hide-sp">' + fmtDate(a.application_date) + '</td>'
      + '<td class="name-cell">' + esc(a.family_name) + '　' + esc(a.given_name) + '</td>'
      + '<td class="hide-sp">' + esc(a.plan_name || a.plan_id) + '</td>'
      + '<td>' + statusBadge + '</td>'
      + '<td>' + btn + '</td>'
      + '</tr>';
  }).join('');
}

function makeStatusBadge(status) {
  var labels  = { pending: '未確認', approved: '承認済み', rejected: '差し戻し' };
  var classes = { pending: 's-pending', approved: 's-approved', rejected: 's-rejected' };
  return '<span class="status-badge ' + (classes[status]||'') + '">' + (labels[status]||status) + '</span>';
}

function goToDetail(id) {
  var base = window.location.href.replace(/[?#].*$/, '');
  window.location.href = base + '?page=member-detail&id=' + encodeURIComponent(id);
}

function goHome() {
  var base = window.location.href.replace(/[?#].*$/, '');
  window.location.href = base + '?page=home';
}

function fmtDate(str) {
  if (!str) return '';
  var d = new Date(str);
  if (isNaN(d.getTime())) return String(str);
  return d.getFullYear() + '/' + p2(d.getMonth()+1) + '/' + p2(d.getDate())
       + ' ' + p2(d.getHours()) + ':' + p2(d.getMinutes());
}
function p2(n) { return n < 10 ? '0' + n : String(n); }
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
