<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>診療記録の追加</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">診療記録の追加</h1>
        <form action="/patient/{{ patient_id }}/add_record" method="POST">
            <div class="mb-3">
                <label for="treatment_date" class="form-label">診療日</label>
                <input type="date" class="form-control" id="treatment_date" name="treatment_date" required>
            </div>
            <div class="mb-3">
                <label for="symptoms" class="form-label">症状の経過</label>
                <textarea class="form-control" id="symptoms" name="symptoms" rows="3" placeholder="症状の経過を入力してください"></textarea>
            </div>
            <div class="mb-3">
                <label for="treatment" class="form-label">治療内容</label>
                <textarea class="form-control" id="treatment" name="treatment" rows="3" placeholder="治療内容を入力してください"></textarea>
            </div>
            <div class="mb-3">
                <label for="notes" class="form-label">備考</label>
                <textarea class="form-control" id="notes" name="notes" rows="3" placeholder="備考を入力してください"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">記録を追加</button>
            <a href="/" class="btn btn-secondary">キャンセル</a>
        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
