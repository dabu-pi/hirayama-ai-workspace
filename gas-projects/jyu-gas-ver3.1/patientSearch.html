<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>患者検索 — JREC-01</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f5f6fa;
      color: #333;
      padding: 16px;
    }
    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #2c3e50;
      margin-bottom: 16px;
    }
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    #keyword {
      flex: 1;
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
    }
    #keyword:focus { border-color: #3498db; }
    button#searchBtn {
      padding: 10px 18px;
      font-size: 15px;
      background: #3498db;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }
    button#searchBtn:hover { background: #2980b9; }
    button#searchBtn:disabled { background: #aaa; cursor: default; }

    #status {
      font-size: 13px;
      color: #777;
      margin-bottom: 10px;
      min-height: 18px;
    }

    /* 結果テーブル */
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
    }
    thead th {
      background: #2c3e50;
      color: #fff;
      padding: 10px 12px;
      text-align: left;
      font-size: 13px;
      font-weight: 600;
    }
    tbody tr {
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: background .1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody td {
      padding: 12px 12px;
      font-size: 14px;
      vertical-align: middle;
    }
    tbody tr:hover  { background: #e8f4fd; }
    tbody tr:active { background: #d0eaf9; }
    tbody tr.selected { background: #c8e6fa; }
    tbody tr.selecting { opacity: .6; pointer-events: none; }

    .pid  { color: #888; font-size: 12px; }
    .name { font-weight: 600; font-size: 15px; }
    .furi { color: #666; font-size: 12px; margin-top: 2px; }
    .dob  { color: #555; font-size: 13px; }
    .arrow {
      text-align: center;
      font-size: 18px;
      color: #bbb;
      width: 28px;
    }
    tbody tr:hover .arrow { color: #3498db; }

    #emptyMsg {
      display: none;
      text-align: center;
      padding: 32px 0;
      color: #999;
      font-size: 15px;
    }
    #results { display: none; }

    /* 選択完了トースト */
    #toast {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #27ae60;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
      z-index: 100;
      white-space: nowrap;
    }
    #toast.error { background: #e74c3c; }
  </style>
</head>
<body>
  <h1>患者検索</h1>

  <div class="search-row">
    <input type="text" id="keyword" placeholder="患者ID・氏名・フリガナで検索" autofocus>
    <button id="searchBtn" onclick="doSearch()">検索</button>
  </div>

  <div id="status"></div>

  <div id="emptyMsg">該当する患者が見つかりませんでした。</div>

  <table id="results">
    <thead>
      <tr>
        <th>患者ID / 氏名</th>
        <th>生年月日</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <div id="toast"></div>

  <script>
    var _searching  = false;
    var _selecting  = false;

    document.getElementById("keyword").addEventListener("keydown", function(e) {
      if (e.key === "Enter") doSearch();
    });

    /* ===== 検索 ===== */
    function doSearch() {
      if (_searching) return;
      var kw = document.getElementById("keyword").value.trim();
      if (!kw) { setStatus("キーワードを入力してください。"); return; }

      _searching = true;
      document.getElementById("searchBtn").disabled = true;
      setStatus("検索中…");
      hide("results");
      hide("emptyMsg");
      document.getElementById("tbody").innerHTML = "";

      google.script.run
        .withSuccessHandler(onSearchSuccess)
        .withFailureHandler(onSearchError)
        .searchPatients_V3(kw);
    }

    function onSearchSuccess(rows) {
      _searching = false;
      document.getElementById("searchBtn").disabled = false;

      if (!rows || rows.length === 0) {
        setStatus("");
        show("emptyMsg");
        return;
      }

      var hint = rows.length === 20 ? "（最大20件）" : "";
      setStatus(rows.length + " 件ヒット" + hint + " — 行をタップして選択");

      var tbody = document.getElementById("tbody");
      rows.forEach(function(p) {
        var tr = document.createElement("tr");
        tr.dataset.pid = p.patientId;
        tr.innerHTML =
          "<td>" +
            "<div class='pid'>" + esc(p.patientId) + "</div>" +
            "<div class='name'>" + esc(p.name) + "</div>" +
            "<div class='furi'>" + esc(p.furi) + "</div>" +
          "</td>" +
          "<td class='dob'>" + esc(p.birthday) + "</td>" +
          "<td class='arrow'>›</td>";

        tr.addEventListener("click", function() {
          selectPatient(this, p.patientId, p.name);
        });
        tbody.appendChild(tr);
      });
      show("results");
    }

    function onSearchError(err) {
      _searching = false;
      document.getElementById("searchBtn").disabled = false;
      setStatus("検索エラー: " + (err.message || err));
    }

    /* ===== 患者選択 ===== */
    function selectPatient(tr, patientId, name) {
      if (_selecting) return;
      _selecting = true;

      // 選択中の視覚フィードバック
      tr.classList.add("selecting");
      setStatus("選択中…");

      google.script.run
        .withSuccessHandler(function(res) {
          _selecting = false;
          tr.classList.remove("selecting");
          tr.classList.add("selected");
          showToast("✓ " + esc(name) + " を選択しました", false);
          setStatus("選択完了: " + esc(patientId));
        })
        .withFailureHandler(function(err) {
          _selecting = false;
          tr.classList.remove("selecting");
          showToast("エラー: " + (err.message || err), true);
          setStatus("選択失敗");
        })
        .setPatientAndDate_V3(patientId);
    }

    /* ===== トースト ===== */
    function showToast(msg, isError) {
      var el = document.getElementById("toast");
      el.textContent = msg;
      el.className = isError ? "error" : "";
      el.style.display = "block";
      setTimeout(function() { el.style.display = "none"; }, 3000);
    }

    /* ===== ユーティリティ ===== */
    function setStatus(msg) { document.getElementById("status").textContent = msg; }
    function show(id) { document.getElementById(id).style.display = ""; }
    function hide(id) { document.getElementById(id).style.display = "none"; }
    function esc(s) {
      return String(s || "")
        .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;");
    }
  </script>
</body>
</html>
