<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>患者一覧 — JREC-SF01</title>
  <script>var APP_URL = "<?= getAppUrl_() ?>";</script>
  <?!= include('styles') ?>
</head>
<body>

<?!= include('index') ?>

<div class="container">
  <div class="card">

    <!-- 検索バー -->
    <div class="toolbar">
      <form class="search-form" method="get" action="<?= getAppUrl_() ?>">
        <input type="hidden" name="page" value="list">
        <input type="text" name="q" value="<?= query ?>"
               placeholder="氏名・フリガナ・患者ID・電話番号で検索">
        <button class="btn btn-secondary" type="submit">検索</button>
        <? if (query) { ?>
          <a href="<?= getAppUrl_() ?>" class="btn btn-secondary">クリア</a>
        <? } ?>
      </form>
    </div>

    <!-- 件数 -->
    <? if (patients.length > 0) { ?>
      <p class="count-label"><?= patients.length ?> 件</p>
    <? } ?>

    <!-- 患者テーブル -->
    <? if (patients.length === 0) { ?>
      <div class="no-data">
        <svg width="40" height="40" fill="none" stroke="#dadce0" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p>
          <?= query
            ? '「' + query + '」に該当する患者が見つかりませんでした。'
            : '患者が登録されていません。「＋ 新規患者登録」から登録してください。' ?>
        </p>
      </div>
    <? } else { ?>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>患者ID</th>
              <th>氏名</th>
              <th>フリガナ</th>
              <th>電話番号</th>
              <th>最終来院日</th>
              <th style="text-align:right;">来院数</th>
              <th style="text-align:right;">未収残高</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <? patients.forEach(function(p) { ?>
            <tr class="<?= p.outstanding > 0 ? 'row-outstanding' : '' ?>">
              <td class="pid"><?= p.patientId ?></td>
              <td class="name"><?= p.name ?></td>
              <td class="muted"><?= p.kana || '—' ?></td>
              <td><?= p.phone || '—' ?></td>
              <td class="muted"><?= p.lastVisitDate || '—' ?></td>
              <td style="text-align:right;">
                <?= p.visitCount > 0 ? p.visitCount + '回' : '<span class="muted">—</span>' ?>
              </td>
              <td style="text-align:right;">
                <? if (p.outstanding > 0) { ?>
                  <span class="badge badge-warn">¥<?= p.outstanding ?></span>
                <? } else { ?>
                  <span class="muted">0円</span>
                <? } ?>
              </td>
              <td>
                <a href="<?= getAppUrl_() + '?page=detail&id=' + p.patientId ?>"
                   class="btn btn-secondary btn-sm">詳細</a>
              </td>
            </tr>
            <? }); ?>
          </tbody>
        </table>
      </div>
    <? } ?>
  </div>
</div>

</body>
</html>
