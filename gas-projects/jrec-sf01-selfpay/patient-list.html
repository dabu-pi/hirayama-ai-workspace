<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>患者一覧 — JREC-SF01</title>
  <script>var APP_URL = "<?= appUrl ?>"; var CURRENT_PAGE = "<?= currentPage ?>";</script>
  <?!= include('styles') ?>
</head>
<body>

<?!= include('index') ?>

<div class="container">
  <div class="card">

    <!-- 検索バー -->
    <div class="toolbar">
      <form class="search-form" id="searchForm" onsubmit="return doSearch(event)">
        <input type="text" id="searchQ" value="<?= query ?>"
               placeholder="氏名・フリガナ・患者ID・電話番号で検索">
        <button class="btn btn-secondary" type="submit">検索</button>
        <? if (query) { ?>
          <button class="btn btn-secondary" type="button"
            onclick="window.top.location.href = APP_URL">クリア</button>
        <? } ?>
      </form>
    </div>

    <!-- 件数 + 未収/未会計サマリー -->
    <? if (patients.length > 0) {
      var outstandingCount = 0, unbilledPatientCount = 0;
      patients.forEach(function(p) {
        if (p.outstanding   > 0) outstandingCount++;
        if (p.unbilledCount > 0) unbilledPatientCount++;
      });
    ?>
      <p class="count-label">
        <?= patients.length ?> 件
        <? if (outstandingCount > 0) { ?>
          　<span style="color:#d93025;font-weight:700;">（未収あり <?= outstandingCount ?> 名）</span>
        <? } ?>
        <? if (unbilledPatientCount > 0) { ?>
          　<span style="color:#e37400;font-weight:700;">（未会計あり <?= unbilledPatientCount ?> 名）</span>
        <? } ?>
      </p>
    <? } ?>

    <!-- 患者テーブル -->
    <? if (patients.length === 0) { ?>
      <div class="no-data">
        <svg width="40" height="40" fill="none" stroke="#dadce0" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p>
          <?= query
            ? '「' + query + '」に該当する患者が見つかりませんでした。'
            : '患者が登録されていません。「＋ 新規患者登録」から登録してください。' ?>
        </p>
      </div>
    <? } else { ?>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>患者ID</th>
              <th>氏名</th>
              <th>フリガナ</th>
              <th>電話番号</th>
              <th>最終来院日</th>
              <th style="text-align:right;">来院数</th>
              <th style="text-align:right;">未収残高</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <? patients.forEach(function(p) { ?>
            <tr class="<?= p.outstanding > 0 ? 'row-outstanding' : '' ?>">
              <td class="pid"><?= p.patientId ?></td>
              <td class="name"><?= p.name ?></td>
              <td class="muted"><?= p.kana || '—' ?></td>
              <td><?= p.phone || '—' ?></td>
              <td class="muted"><?= p.lastVisitDate || '—' ?></td>
              <td style="text-align:right;">
                <? if (p.visitCount > 0) { ?>
                  <?= p.visitCount ?>回
                <? } else { ?>
                  <span class="muted">—</span>
                <? } ?>
              </td>
              <td style="text-align:right;">
                <? if (p.outstanding > 0) { ?>
                  <span class="badge badge-warn">¥<?!= Number(p.outstanding).toLocaleString() ?></span>
                <? } else { ?>
                  <span class="muted">¥0</span>
                <? } ?>
                <? if (p.unbilledCount > 0) { ?>
                  <div style="margin-top:3px;font-size:11px;color:#e37400;font-weight:600;">
                    未会計 <?= p.unbilledCount ?>件
                  </div>
                <? } ?>
              </td>
              <td>
                <button type="button" class="btn btn-secondary btn-sm"
                  onclick="window.top.location.href = APP_URL + '?page=detail&id=<?= p.patientId ?>'">
                  詳細
                </button>
              </td>
            </tr>
            <? }); ?>
          </tbody>
        </table>
      </div>
    <? } ?>
  </div>
</div>

<script>
function doSearch(e) {
  if (e) e.preventDefault();
  var q = document.getElementById('searchQ').value.trim();
  window.top.location.href = APP_URL + (q ? '?page=list&q=' + encodeURIComponent(q) : '');
  return false;
}
</script>

</body>
</html>
