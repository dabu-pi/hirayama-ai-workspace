    .receipt-tax  { font-size: 13px; color: #5f6368; margin-bottom: 14px; }
    .receipt-desc {
      font-size: 13px;
      padding: 10px 0;
      border-top: 1px solid #e0e0e0;

      margin-top: 16px;

    /* ── 印刷スタイル ── */

      body { background: white; -webkit-print-color-adjust: exact; }
      .container { max-width: none; padding: 0; }
      .card { box-shadow: none; border: none; padding: 0; margin: 0; }
      .receipt-box {
        border: none;
        border-radius: 0;
        max-width: none;
        padding: 20px 24px;
        margin: 0;

      .receipt-title { letter-spacing: 0.8em; }
    }
  </style>
</head>
<body>

<!-- JS初期化エラーを DOM に表示 -->
<script>

  if (el) el.innerHTML = '<div class="alert alert-error">JS初期化エラー: ' + msg + ' (line ' + line + ')</div>';
  return false;
};
</script>

<?!= include('index') ?>

<div class="container">

        <span class="pid"><?= visit.patientId ?></span>
        <span style="font-size:17px;font-weight:700;margin-left:10px;">

        <? if (!payment) { ?>
          <button type="button" class="btn btn-primary btn-sm"

        <button type="button" class="btn btn-secondary btn-sm"

      </div>
    </div>
  </div>

  <!-- ── メインカード ─────────────────────────────────────── -->

    <div id="msg"></div>

    <!-- ── 状態 1: 未会計 ──────────────────────────────────── -->
    <? if (!payment) { ?>
    <div id="stateUnpaid">
      <h2 style="font-size:16px;font-weight:700;margin-bottom:16px;">領収書</h2>
      <div class="phase-note" style="margin-bottom:20px;">
        この来院はまだ会計されていません。先に会計入力を行ってください。
      </div>
      <table class="info-table" style="width:100%;margin-bottom:20px;">
        <tbody>
          <tr><td>来院キー</td>
            <td style="font-family:monospace;font-size:12px;"><?= visit.selfPayVisitKey ?></td></tr>
          <tr><td>来院日</td><td><?= visit.visitDate ?></td></tr>

      </div>

    <div id="statePaid">

      <!-- 会計サマリー（印刷時非表示） -->
      <div class="no-print" style="margin-bottom:20px;">
        <h2 style="font-size:16px;font-weight:700;margin-bottom:12px;">領収書</h2>
        <table class="info-table" style="width:100%;">
          <tbody>
            <tr><td>来院キー</td>
              <td style="font-family:monospace;font-size:12px;"><?= visit.selfPayVisitKey ?></td></tr>
            <tr><td>来院日</td><td><?= visit.visitDate ?></td></tr>

      <!-- 領収書エリア（発行ボタン or 発行済みプレビュー） -->

      <!-- 発行ボタン（receipt == null のとき表示、発行後に非表示） -->
      <div id="issueArea"
        style="<?= receipt ? 'display:none;' : '' ?>">
        <div class="phase-note no-print" style="margin-bottom:14px;">
          会計は完了しています。「領収書を発行する」ボタンで Receipts シートに保存し、領収書番号を発行します。

            onclick="handleIssue()">領収書を発行する</button>
        </div>

      <!-- 発行済み領収書エリア（JS で描画） -->
      <div id="receiptArea" style="<?= receipt ? '' : 'display:none;' ?>">
        <!-- showReceiptBox() で描画される -->
      </div>

      <!-- 印刷・戻るボタン（receiptArea が表示されたとき表示） -->
      <div id="receiptActions" class="form-actions no-print"
        style="<?= receipt ? '' : 'display:none;' ?>">
        <button type="button" class="btn btn-secondary"
          onclick="goToDetail()">← 患者詳細に戻る</button>
        <button type="button" class="btn btn-primary"
          onclick="window.print()">印刷</button>
      </div>

    </div>

  </div><!-- /card -->
</div><!-- /container -->

<script>
var VISIT_KEY    = "<?= visit.selfPayVisitKey ?>";
var PATIENT_ID   = "<?= visit.patientId ?>";
var CLINIC_NAME  = "<?= clinicName ?>";
var PATIENT_NAME = "<?= patient ? patient.name : visit.patientId ?>";
var PAYMENT = <?!= JSON.stringify(payment || null).replace(/<\//g, '<\\/') ?>;
var RECEIPT = <?!= JSON.stringify(receipt || null).replace(/<\//g, '<\\/') ?>;
var ITEMS   = <?!= JSON.stringify(items   || []).replace(/<\//g, '<\\/') ?>;

// ── ナビゲーション ────────────────────────────────────────
function navigate(url) {
  try { window.top.location.href = url; } catch(e) {
    try { window.location.href = url; } catch(e2) {}
  }
}
function goToDetail()  { navigate(APP_URL + '?page=detail&id='       + encodeURIComponent(PATIENT_ID)); }
function goToBilling() { navigate(APP_URL + '?page=billing&visitKey=' + encodeURIComponent(VISIT_KEY)); }

// ── ユーティリティ ───────────────────────────────────────
function fmtNum(n) { return Number(n || 0).toLocaleString(); }
function escHtml(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function formatDateJP(dateStr) {
  if (!dateStr) return '';
  var p = String(dateStr).split('-');
  return p.length === 3
    ? p[0] + '年' + parseInt(p[1]) + '月' + parseInt(p[2]) + '日'
    : dateStr;
}
function showMsg(type, html) {
  var el = document.getElementById('msg');
  if (!el) return;
  el.innerHTML = '<div class="alert alert-' + type + '">' + html + '</div>';
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function clearMsg() { var el = document.getElementById('msg'); if (el) el.innerHTML = ''; }

// ── 領収書プレビュー描画 ────────────────────────────────
function showReceiptBox(data) {
  // data: issueReceipt() レスポンス or RECEIPT オブジェクト（getReceiptByVisit 由来）
  var addressee   = data.addressee  || data.patientName || PATIENT_NAME;
  var description = data.description || '施術費として';
  var clinicName  = data.clinicName  || CLINIC_NAME;
  var receiptNo   = data.receiptNo   || data.receiptId  || '';
  var issuedDate  = formatDateJP(data.issuedDate || '');
  var totalInc    = data.totalTaxInc || (PAYMENT ? PAYMENT.totalTaxInc : 0);
  var totalTax    = data.totalTaxAmt || (PAYMENT ? PAYMENT.totalTaxAmt : 0);

  // 明細行 HTML（ITEMS 優先、なければ合計のみ）
  var itemsHtml = '';
  if (ITEMS && ITEMS.length > 0) {
    itemsHtml += '<table class="receipt-items"><tbody>';
    ITEMS.forEach(function(item) {
      itemsHtml +=
        '<tr>' +
          '<td>' + escHtml(item.menuName) + '</td>' +
          '<td style="text-align:center;">×' + (item.qty || 1) + '</td>' +
          '<td>¥' + fmtNum(item.subtotalInc) + '</td>' +
        '</tr>';
    });
    itemsHtml += '</tbody></table>';
  }

  var html =
    '<div class="receipt-box">' +
      '<div class="receipt-title">領　収　書</div>' +
      '<div class="receipt-header-row">' +
        '<span>No. ' + escHtml(receiptNo) + '</span>' +
        '<span>' + escHtml(issuedDate) + '</span>' +
      '</div>' +
      '<div class="receipt-addressee">' + escHtml(addressee) + ' 様</div>' +
      '<div class="receipt-amount">¥' + fmtNum(totalInc) +
        '<small>（税込）</small></div>' +
      '<div class="receipt-tax">内消費税　¥' + fmtNum(totalTax) + '</div>' +
      '<div class="receipt-desc">但し書き: ' + escHtml(description) + '</div>' +
      itemsHtml +
      '<div class="receipt-clinic">' + escHtml(clinicName) + '</div>' +
    '</div>';

  var areaEl   = document.getElementById('receiptArea');
  var actEl    = document.getElementById('receiptActions');
  var issueEl  = document.getElementById('issueArea');
  if (areaEl) { areaEl.innerHTML = html; areaEl.style.display = ''; }
  if (actEl)  { actEl.style.display = ''; }
  if (issueEl){ issueEl.style.display = 'none'; }
}

// ── 領収書発行 ───────────────────────────────────────────
function handleIssue() {
  clearMsg();

  if (typeof google === 'undefined' || !google.script || !google.script.run) {
    showMsg('error', 'google.script.run が利用できません。WebApp URL として開いているか確認してください。');
    return;
  }

  var btn = document.getElementById('issueBtn');
  btn.disabled    = true;
  btn.textContent = '発行中...';

  console.log('[receiptPage] issueReceipt:', VISIT_KEY);

  var issueTimer = setTimeout(function() {
    showMsg('error', '発行がタイムアウトしました（20秒）。<br>Apps Script エディタ → 実行数 でエラーを確認してください。');
    btn.disabled    = false;
    btn.textContent = '領収書を発行する';
  }, 20000);

  try {
    google.script.run
      .withSuccessHandler(function(res) {
        clearTimeout(issueTimer);
        console.log('[receiptPage] issueReceipt result:', JSON.stringify(res));
        if (res && res.ok) {
          if (res.alreadyIssued) {
            showMsg('success', '既に発行済みの領収書を表示しています。');
          } else {
            showMsg('success', '領収書を発行しました（' + res.receiptNo + '）。');
          }
          showReceiptBox(res);
        } else {
          var errMsg = (res && res.error) ? res.error : '発行に失敗しました（原因不明）';
          console.error('[receiptPage] issue failed:', errMsg);
          showMsg('error', '発行エラー: ' + errMsg);
          btn.disabled    = false;
          btn.textContent = '領収書を発行する';
        }
      })
      .withFailureHandler(function(err) {
        clearTimeout(issueTimer);
        var msg = err ? (err.message || String(err)) : '不明なGASエラー';
        console.error('[receiptPage] GAS failure:', msg);
        showMsg('error', 'GAS実行エラー: ' + msg +
          '<br><small>Apps Script エディタ → 実行数 で詳細を確認してください。</small>');
        btn.disabled    = false;
        btn.textContent = '領収書を発行する';
      })
      .issueReceipt(VISIT_KEY);
  } catch(syncErr) {
    clearTimeout(issueTimer);
    console.error('[receiptPage] sync error:', syncErr.message);
    showMsg('error', 'google.script.run 同期エラー: ' + syncErr.message);
    btn.disabled    = false;
    btn.textContent = '領収書を発行する';
  }
}

// ── 初期化 ────────────────────────────────────────────────
(function() {
  // ページロード時に発行済みの receipt があれば即描画
  if (RECEIPT) {
    showReceiptBox(RECEIPT);
  }
})();
</script>
</body>
</html>
