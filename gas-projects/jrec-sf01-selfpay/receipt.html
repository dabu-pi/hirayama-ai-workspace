<script>
var VISIT_KEY    = "<?= visit.selfPayVisitKey ?>";
var PATIENT_ID   = "<?= visit.patientId ?>";
var CLINIC_NAME  = "<?= clinicName ?>";
var PATIENT_NAME = "<?= patient ? patient.name : visit.patientId ?>";
var PAYMENT = <?!= JSON.stringify(payment || null).replace(/<\//g, '<\\/') ?>;
var RECEIPT = <?!= JSON.stringify(receipt || null).replace(/<\//g, '<\\/') ?>;
var ITEMS   = <?!= JSON.stringify(items   || []).replace(/<\//g, '<\\/') ?>;
var SHOW_ISSUE_AREA = false;
<? if (!receipt && payment && payment.paymentStatus === '入金済') { ?>
SHOW_ISSUE_AREA = true;
<? } ?>

// ── ナビゲーション ────────────────────────────────────────
function navigate(url) {
  try { window.top.location.href = url; } catch(e) {
    try { window.location.href = url; } catch(e2) {}
  }
}
function goToDetail()  { navigate(APP_URL + '?page=detail&id='       + encodeURIComponent(PATIENT_ID)); }
function goToBilling() { navigate(APP_URL + '?page=billing&visitKey=' + encodeURIComponent(VISIT_KEY)); }

// ── ユーティリティ ───────────────────────────────────────
function fmtNum(n) { return Number(n || 0).toLocaleString(); }
function escHtml(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function formatDateJP(dateStr) {
  if (!dateStr) return '';
  var p = String(dateStr).split('-');
  return p.length === 3
    ? p[0] + '年' + parseInt(p[1]) + '月' + parseInt(p[2]) + '日'
    : dateStr;
}
function showMsg(type, html) {
  var el = document.getElementById('msg');
  if (!el) return;
  el.innerHTML = '<div class="alert alert-' + type + '">' + html + '</div>';
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function clearMsg() { var el = document.getElementById('msg'); if (el) el.innerHTML = ''; }

// ── 未収回収 ─────────────────────────────────────────────
function showCollectMsg(type, html) {
  var el = document.getElementById('collectMsg');
  if (el) el.innerHTML = '<div class="alert alert-' + type + '">' + html + '</div>';
}

function fillFullAmount() {
  var remaining = PAYMENT
    ? Math.max((PAYMENT.totalTaxInc || 0) - (PAYMENT.paidAmount || 0), 0)
    : 0;
  var input = document.getElementById('collectedAmount');
  if (input) input.value = remaining;
  var errEl = document.getElementById('collAmountError');
  if (errEl) errEl.style.display = 'none';
}

function handleCollect() {
  var btn = document.getElementById('collectBtn');
  if (!btn) return;

  if (typeof google === 'undefined' || !google.script || !google.script.run) {
    showCollectMsg('error', 'google.script.run が利用できません。WebApp URL として開いているか確認してください。');
    return;
  }

  // ── 今回回収額のバリデーション ───────────────────────
  var amtInput  = document.getElementById('collectedAmount');
  var errEl     = document.getElementById('collAmountError');
  var collectedAmount = amtInput ? parseInt(amtInput.value, 10) : NaN;
  var remaining = PAYMENT
    ? Math.max((PAYMENT.totalTaxInc || 0) - (PAYMENT.paidAmount || 0), 0)
    : 0;

  if (errEl) errEl.style.display = 'none';
  if (isNaN(collectedAmount) || collectedAmount <= 0) {
    if (errEl) { errEl.textContent = '今回回収額を入力してください（1円以上）。'; errEl.style.display = ''; }
    return;
  }
  if (collectedAmount > remaining) {
    if (errEl) { errEl.textContent = '未収残額（¥' + fmtNum(remaining) + '）を超えています。'; errEl.style.display = ''; }
    return;
  }

  var method = document.getElementById('collectMethod');
  var memo   = document.getElementById('collectMemo');
  btn.disabled    = true;
  btn.textContent = '処理中...';

  var payload = {
    collectedAmount: collectedAmount,
    paymentMethod:   method ? method.value : '現金',
    memo:            memo   ? memo.value.trim() : ''
  };
  console.log('[receiptPage] collectOutstandingPayment:', VISIT_KEY, JSON.stringify(payload));

  var timer = setTimeout(function() {
    showCollectMsg('error',
      '処理がタイムアウトしました（20秒）。<br>Apps Script エディタ → 実行数 でエラーを確認してください。');
    btn.disabled    = false;
    btn.textContent = '回収実行';
  }, 20000);

  try {
    google.script.run
      .withSuccessHandler(function(res) {
        clearTimeout(timer);
        console.log('[receiptPage] collect result:', JSON.stringify(res));
        if (res && res.ok) {
          // ── PAYMENT オブジェクトを更新 ───────────────────
          if (PAYMENT) {
            PAYMENT.paymentStatus   = res.newStatus;
            PAYMENT.paidAmount      = res.paidAmount;
            PAYMENT.remainingAmount = res.remainingAmount;
            if (res.paymentMethod) PAYMENT.paymentMethod = res.paymentMethod;
            if (res.paymentDate)   PAYMENT.paymentDate   = res.paymentDate;
          }

          // ── サマリーテーブルの入金状態・支払方法・入金日を更新 ─
          var statusEl = document.getElementById('paymentStatusDisplay');
          if (statusEl) {
            statusEl.textContent    = res.newStatus;
            statusEl.style.color      = res.newStatus === '入金済' ? '#1e8e3e' : '#e37400';
            statusEl.style.fontWeight = '700';
          }
          if (res.paymentMethod) {
            var methodEl = document.getElementById('paymentMethodDisplay');
            if (methodEl) methodEl.textContent = res.paymentMethod;
          }
          if (res.paymentDate) {
            var dateEl = document.getElementById('paymentDateDisplay');
            if (dateEl) dateEl.textContent = res.paymentDate;
          }

          if (res.newStatus === '入金済') {
            // ── 全額回収完了 → 回収エリアを非表示・発行ボタンを表示 ──
            var area = document.getElementById('collectionArea');
            if (area) area.style.display = 'none';
            var issueEl = document.getElementById('issueArea');
            if (issueEl) issueEl.style.display = '';
            showMsg('success',
              '全額回収完了（入金日: ' + res.paymentDate + '　今回: ¥' + fmtNum(res.collectedAmount) + '）。' +
              '<br>このまま領収書を発行できます。'
            );
          } else {
            // ── 一部回収 → 残額を更新して継続可能 ──────────
            var paidEl = document.getElementById('collPaidDisplay');
            if (paidEl) paidEl.textContent = '¥' + fmtNum(res.paidAmount);
            var remEl  = document.getElementById('collRemainingDisplay');
            if (remEl)  remEl.textContent  = '¥' + fmtNum(res.remainingAmount);
            if (amtInput) amtInput.value = '';
            btn.disabled    = false;
            btn.textContent = '回収実行';
            showCollectMsg('success',
              '¥' + fmtNum(res.collectedAmount) + ' を回収しました。残額: ¥' + fmtNum(res.remainingAmount));
          }
        } else {
          var errMsg = (res && res.error) ? res.error : '回収処理に失敗しました（原因不明）';
          showCollectMsg('error', errMsg);
          btn.disabled    = false;
          btn.textContent = '回収実行';
        }
      })
      .withFailureHandler(function(err) {
        clearTimeout(timer);
        var msg = err ? (err.message || String(err)) : '不明なGASエラー';
        showCollectMsg('error', 'GAS エラー: ' + msg +
          '<br><small>Apps Script エディタ → 実行数 で詳細を確認してください。</small>');
        btn.disabled    = false;
        btn.textContent = '回収実行';
      })
      .collectOutstandingPayment(VISIT_KEY, payload);
  } catch(syncErr) {
    clearTimeout(timer);
    showCollectMsg('error', '同期エラー: ' + syncErr.message);
    btn.disabled    = false;
    btn.textContent = '回収実行';
  }
}

// ── 領収書プレビュー描画 ────────────────────────────────
function showReceiptBox(data) {
  // data: issueReceipt() レスポンス or RECEIPT オブジェクト（getReceiptByVisit 由来）
  var addressee   = data.addressee  || data.patientName || PATIENT_NAME;
  var description = data.description || '施術費として';
  var clinicName  = data.clinicName  || CLINIC_NAME;
  var receiptNo   = data.receiptNo   || data.receiptId  || '';
  var issuedDate  = formatDateJP(data.issuedDate || '');
  var totalInc    = data.totalTaxInc || (PAYMENT ? PAYMENT.totalTaxInc : 0);
  var totalTax    = data.totalTaxAmt || (PAYMENT ? PAYMENT.totalTaxAmt : 0);

  // 明細行 HTML（ITEMS 優先、なければ合計のみ）
  var itemsHtml = '';
  if (ITEMS && ITEMS.length > 0) {
    itemsHtml += '<table class="receipt-items"><tbody>';
    ITEMS.forEach(function(item) {
      itemsHtml +=
        '<tr>' +
          '<td>' + escHtml(item.menuName) + '</td>' +
          '<td style="text-align:center;">×' + (item.qty || 1) + '</td>' +
          '<td>¥' + fmtNum(item.subtotalInc) + '</td>' +
        '</tr>';
    });
    itemsHtml += '</tbody></table>';
  }

  // 発行済みステータスバナー（印刷時非表示）
  var statusBanner =
    '<div class="no-print" style="display:flex;align-items:center;gap:10px;' +
    'padding:10px 14px;background:#e6f4ea;border:1px solid #a8d5b5;' +
    'border-radius:6px;margin-bottom:14px;font-size:13px;">' +
      '<span style="color:#1e8e3e;font-weight:700;">✅ 発行済み</span>' +
      '<span style="font-family:monospace;color:#5f6368;">No. ' + escHtml(receiptNo) + '</span>' +
      '<span style="color:#9aa0a6;margin-left:auto;">発行日: ' + escHtml(issuedDate) + '</span>' +
    '</div>';

  var html =
    statusBanner +
    '<div class="receipt-box">' +
      '<div class="receipt-title">領　収　書</div>' +
      '<div class="receipt-header-row">' +
        '<span>No. ' + escHtml(receiptNo) + '</span>' +
        '<span>' + escHtml(issuedDate) + '</span>' +
      '</div>' +
      '<div class="receipt-addressee">' + escHtml(addressee) + ' 様</div>' +
      '<div class="receipt-amount">¥' + fmtNum(totalInc) +
        '<small>（税込）</small></div>' +
      '<div class="receipt-tax">内消費税　¥' + fmtNum(totalTax) + '</div>' +
      '<div class="receipt-desc">但し書き: ' + escHtml(description) + '</div>' +
      itemsHtml +
      '<div class="receipt-clinic">' + escHtml(clinicName) + '</div>' +
    '</div>';

  var areaEl   = document.getElementById('receiptArea');
  var actEl    = document.getElementById('receiptActions');
  var issueEl  = document.getElementById('issueArea');
  if (areaEl) { areaEl.innerHTML = html; areaEl.style.display = ''; }
  if (actEl)  { actEl.style.display = ''; }
  if (issueEl){ issueEl.style.display = 'none'; }
}

// ── 領収書発行 ───────────────────────────────────────────
function handleIssue() {
  clearMsg();

  if (typeof google === 'undefined' || !google.script || !google.script.run) {
    showMsg('error', 'google.script.run が利用できません。WebApp URL として開いているか確認してください。');
    return;
  }

  var btn = document.getElementById('issueBtn');
  btn.disabled    = true;
  btn.textContent = '発行中...';

  console.log('[receiptPage] issueReceipt:', VISIT_KEY);

  var issueTimer = setTimeout(function() {
    showMsg('error', '発行がタイムアウトしました（20秒）。<br>Apps Script エディタ → 実行数 でエラーを確認してください。');
    btn.disabled    = false;
    btn.textContent = '領収書を発行する';
  }, 20000);

  try {
    google.script.run
      .withSuccessHandler(function(res) {
        clearTimeout(issueTimer);
        console.log('[receiptPage] issueReceipt result:', JSON.stringify(res));
        if (res && res.ok) {
          if (res.alreadyIssued) {
            showMsg('success', '既に発行済みの領収書を表示しています。');
          } else {
            showMsg('success', '領収書を発行しました（' + res.receiptNo + '）。');
          }
          showReceiptBox(res);
        } else {
          var errMsg = (res && res.error) ? res.error : '発行に失敗しました（原因不明）';
          console.error('[receiptPage] issue failed:', errMsg);
          showMsg('error', '発行エラー: ' + errMsg);
          btn.disabled    = false;
          btn.textContent = '領収書を発行する';
        }
      })
      .withFailureHandler(function(err) {
        clearTimeout(issueTimer);
        var msg = err ? (err.message || String(err)) : '不明なGASエラー';
        console.error('[receiptPage] GAS failure:', msg);
        showMsg('error', 'GAS実行エラー: ' + msg +
          '<br><small>Apps Script エディタ → 実行数 で詳細を確認してください。</small>');
        btn.disabled    = false;
        btn.textContent = '領収書を発行する';
      })
      .issueReceipt(VISIT_KEY);
  } catch(syncErr) {
    clearTimeout(issueTimer);
    console.error('[receiptPage] sync error:', syncErr.message);
    showMsg('error', 'google.script.run 同期エラー: ' + syncErr.message);
    btn.disabled    = false;
    btn.textContent = '領収書を発行する';
  }
}

// ── 初期化 ────────────────────────────────────────────────
(function() {
  if (RECEIPT) {
    showReceiptBox(RECEIPT);
  }
  if (SHOW_ISSUE_AREA) {
    var el = document.getElementById('issueArea');
    if (el) el.style.display = '';
  }
})();
</script>
</body>
