<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JREC-SF01 — 業務メニュー</title>
  <script>var APP_URL = "<?= appUrl ?>"; var CURRENT_PAGE = "<?= currentPage ?>";</script>
  <?!= include('styles') ?>
  <style>
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-top: 8px;
    }
    .menu-card {
      border: 1px solid #dadce0;
      border-radius: 12px;
      padding: 22px 16px;
      text-align: center;
      cursor: pointer;
      transition: box-shadow 0.15s, border-color 0.15s;
      background: #fff;
      width: 100%;
    }
    .menu-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); border-color: #1a73e8; }
    .menu-icon  { font-size: 30px; margin-bottom: 10px; }
    .menu-label { font-size: 14px; font-weight: 700; color: #202124; }
    .menu-desc  { font-size: 12px; color: #5f6368; margin-top: 4px; }
    .menu-card-primary {
      border-color: #1a73e8;
      background: #f0f4ff;
    }
    .menu-card-primary .menu-label { color: #1a73e8; }

    /* ── 月間来院カレンダー ── */
    .cal-title {
      font-size: 14px; font-weight: 700; color: #5f6368;
      margin-bottom: 12px;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-weekday {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: #9aa0a6;
      padding: 4px 0;
    }
    .cal-weekday:first-child { color: #d93025; }
    .cal-weekday:last-child  { color: #1a73e8; }
    .cal-day, button.cal-day {
      min-height: 48px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px 2px;
      font-size: 13px;
      background: none;
      border: none;
      cursor: default;
    }
    .cal-day-empty { background: none; }
    .cal-has-visit {
      background: #e8f0fe;
      cursor: pointer;
      border: 1px solid #c5d8fb !important;
      transition: background 0.12s;
    }
    .cal-has-visit:hover { background: #d2e3fc; }
    .cal-today .cal-num {
      background: #1a73e8;
      color: #fff;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    .cal-num { font-size: 13px; font-weight: 600; color: #202124; line-height: 1.4; }
    .cal-cnt { font-size: 10px; color: #1a73e8; font-weight: 700; margin-top: 1px; }
    @media (max-width: 480px) {
      .cal-day, button.cal-day { min-height: 44px; font-size: 12px; }
    }

    /* ── カレンダー月移動ナビ ── */
    .cal-nav {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .cal-nav-btn {
      padding: 5px 12px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      background: #fff;
      color: #1a73e8;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .cal-nav-btn:hover { background: #e8f0fe; border-color: #1a73e8; }
    .cal-nav-btn-today { background: #f0f4ff; border-color: #c5d8fb; }
  </style>
</head>
<body>

<?!= include('index') ?>

<div class="container">

    <div class="menu-grid">

      <button type="button" class="menu-card menu-card-primary"

      <button type="button" class="menu-card"
        onclick="window.top.location.href = APP_URL + '?page=list'">

        <div class="menu-label">来院・カルテ入力</div>
        <div class="menu-desc">患者一覧から患者を選択</div>
      </button>

    </div>
  </div>

  <!-- 月間来院カレンダー -->
  <div class="card">
    <?
      var _prevMonth = calMonth - 1;
      var _prevYear  = calYear;
      if (_prevMonth < 1) { _prevMonth = 12; _prevYear--; }
      var _nextMonth = calMonth + 1;
      var _nextYear  = calYear;
      if (_nextMonth > 12) { _nextMonth = 1; _nextYear++; }
    ?>
    <div class="cal-title">月間来院カレンダー — <?= calYear ?>年<?= calMonth ?>月</div>
    <div class="cal-nav">
      <button type="button" class="cal-nav-btn"
        onclick="top.location.href=APP_URL+'?page=home&year=<?= _prevYear ?>&month=<?= _prevMonth ?>'">◀ 前月</button>
      <button type="button" class="cal-nav-btn cal-nav-btn-today"
        onclick="top.location.href=APP_URL+'?page=home'">今月</button>
      <button type="button" class="cal-nav-btn"
        onclick="top.location.href=APP_URL+'?page=home&year=<?= _nextYear ?>&month=<?= _nextMonth ?>'">翌月 ▶</button>
    </div>
    <div class="cal-grid">
      <div class="cal-weekday">日</div>
      <div class="cal-weekday">月</div>
      <div class="cal-weekday">火</div>
      <div class="cal-weekday">水</div>
      <div class="cal-weekday">木</div>
      <div class="cal-weekday">金</div>
      <div class="cal-weekday">土</div>
      <?
        var _firstDow    = new Date(calYear, calMonth - 1, 1).getDay();
        var _daysInMonth = new Date(calYear, calMonth, 0).getDate();
        for (var _i = 0; _i < _firstDow; _i++) {
      ?>
        <div class="cal-day cal-day-empty"></div>
      <? } ?>
      <? for (var _d = 1; _d <= _daysInMonth; _d++) {
        var _ds  = calYear + "-" + ("0" + calMonth).slice(-2) + "-" + ("0" + _d).slice(-2);
        var _dd  = calDays[_ds];
        var _isT = (_ds === today);
        var _hasV = !!(_dd && _dd.hasVisit);
        var _cls = "cal-day" + (_isT ? " cal-today" : "") + (_hasV ? " cal-has-visit" : "");
        var _cnt = _hasV ? _dd.visitCount : 0;
      ?>
        <? if (_hasV) { ?>
          <button type="button" class="<?= _cls ?>"
            onclick="top.location.href=APP_URL+'?page=dailyCheckout&date=<?= _ds ?>'">
            <span class="cal-num"><?= _d ?></span>
            <span class="cal-cnt">●<?= _cnt ?></span>
          </button>
        <? } else { ?>
          <div class="<?= _cls ?>">
            <span class="cal-num"><?= _d ?></span>
          </div>
        <? } ?>
      <? } ?>
    </div>
    <div style="margin-top:10px;font-size:11px;color:#9aa0a6;">
      ● のある日をクリックするとその日の来院・会計状況を確認できます
    </div>
  </div>

</div>

</body>
</html>
