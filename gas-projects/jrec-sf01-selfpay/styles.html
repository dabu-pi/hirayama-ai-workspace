<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    font-size: 14px;
    color: #212529;
    background: #f8f9fa;
    min-height: 100vh;
  }

  /* ── Header ── */
  .app-header {
    background: #1a73e8;
    color: #fff;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .app-header h1 { font-size: 17px; font-weight: 600; }
  .app-header .subtitle { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .app-header nav { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

  /* ── Container ── */
  .container { max-width: 980px; margin: 0 auto; padding: 20px 16px; }

  /* ── Card ── */
  .card {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.10);
    padding: 20px;
    margin-bottom: 16px;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-primary   { background: #1a73e8; color: #fff; }
  .btn-primary:hover   { background: #1557b0; }
  .btn-secondary { background: #e8eaed; color: #3c4043; }
  .btn-secondary:hover { background: #d2d5d9; }
  .btn-ghost { background: rgba(255,255,255,0.15); color: #fff; }
  .btn-ghost:hover { background: rgba(255,255,255,0.25); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .search-form {
    display: flex;
    gap: 6px;
    flex: 1;
    min-width: 200px;
  }
  .search-form input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #dadce0;
    border-radius: 4px;
    font-size: 13px;
  }
  .search-form input:focus { outline: none; border-color: #1a73e8; }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: #f1f3f4; }
  th {
    padding: 9px 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: #5f6368;
    border-bottom: 2px solid #e0e0e0;
    white-space: nowrap;
    letter-spacing: 0.03em;
  }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid #e8eaed;
    vertical-align: middle;
  }
  tbody tr:hover { background: #f5f5f5; }
  tr.row-outstanding { background: #fff8e1; }
  tr.row-outstanding:hover { background: #fff3cd; }

  .pid  { color: #80868b; font-size: 12px; font-family: monospace; }
  .name { font-weight: 600; }

  .no-data {
    text-align: center;
    padding: 48px 20px;
    color: #9aa0a6;
  }
  .no-data p { margin-top: 8px; font-size: 13px; }
  .count-label { font-size: 12px; color: #5f6368; margin-bottom: 10px; }

  /* ── Badge ── */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
  }
  .badge-warn { background: #fce8e6; color: #c5221f; }
  .muted { color: #9aa0a6; }

  /* ── Form ── */
  .form-section-title {
    font-size: 13px;
    font-weight: 700;
    color: #5f6368;
    margin: 20px 0 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid #e0e0e0;
  }
  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 5px;
    color: #3c4043;
  }
  .form-label .req { color: #d93025; margin-left: 2px; }
  .form-label .hint { color: #9aa0a6; font-weight: 400; font-size: 11px; margin-left: 6px; }
  .form-control {
    display: block;
    width: 100%;
    padding: 9px 11px;
    border: 1px solid #dadce0;
    border-radius: 4px;
    font-size: 14px;
    color: #212529;
    background: #fff;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form-control:focus {
    outline: none;
    border-color: #1a73e8;
    box-shadow: 0 0 0 2px rgba(26,115,232,0.18);
  }
  textarea.form-control { resize: vertical; }
  .form-row { display: flex; gap: 14px; flex-wrap: wrap; }
  .form-row .form-group { flex: 1; min-width: 160px; }
  .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; padding-top: 16px; border-top: 1px solid #e0e0e0; }

  /* ── Alert ── */
  .alert { padding: 10px 14px; border-radius: 4px; margin-bottom: 12px; font-size: 13px; }
  .alert-error   { background: #fce8e6; color: #c5221f; border: 1px solid #f5c6c3; }
  .alert-success { background: #e6f4ea; color: #1e8e3e; border: 1px solid #a8d5b5; }

  /* ── Patient detail summary card ── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .summary-item { text-align: center; }
  .summary-item .label { font-size: 11px; color: #9aa0a6; margin-bottom: 4px; }
  .summary-item .value { font-size: 20px; font-weight: 700; color: #212529; }
  .summary-item .value.warn { color: #d93025; }

  .info-table td:first-child { color: #5f6368; font-size: 12px; width: 120px; }
  .info-table td { padding: 7px 0; border-bottom: 1px solid #f1f3f4; }

  .phase-note {
    background: #e8f0fe;
    border-left: 3px solid #1a73e8;
    padding: 10px 14px;
    border-radius: 0 4px 4px 0;
    font-size: 12px;
    color: #1967d2;
    margin: 12px 0;
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .app-header { padding: 10px 14px; }
    .app-header h1 { font-size: 15px; }
    .container { padding: 12px 10px; }
    th, td { padding: 8px 8px; font-size: 12px; }
    .form-row { flex-direction: column; }
    .form-row .form-group { min-width: unset; }
  }
</style>
