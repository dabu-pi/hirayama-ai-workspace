<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>公開商品画像プレビュー</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>公開商品画像プレビュー</h1>
      <p class="subtitle">products.public.with-images.json を使ったローカル確認用フロントです。</p>
    </div>
    <div class="meta" id="meta"></div>
  </header>

  <main class="layout">
    <section class="catalog">
      <div class="catalog-header">
        <h2>一覧表示</h2>
        <p>通常商品は画像表示、placeholder 商品は「画像準備中」を表示します。</p>
      </div>
      <div class="product-grid" id="product-grid"></div>
    </section>

    <aside class="detail">
      <div class="detail-header">
        <h2>詳細表示</h2>
        <p>primary は image_seq=1、gallery は image_seq 昇順です。</p>
      </div>
      <div id="detail-panel" class="detail-panel"></div>
    </aside>
  </main>

  <template id="product-card-template">
    <button class="product-card" type="button">
      <div class="image-frame">
        <img class="product-image" alt="" />
        <div class="placeholder-message" hidden>画像準備中</div>
      </div>
      <div class="product-body">
        <div class="product-code"></div>
        <div class="product-name"></div>
        <div class="product-tags"></div>
      </div>
    </button>
  </template>

  <template id="detail-template">
    <div class="detail-card">
      <div class="detail-main">
        <div class="detail-image-frame">
          <img class="detail-image" alt="" />
          <div class="detail-placeholder" hidden>画像準備中</div>
        </div>
        <div class="detail-text">
          <div class="detail-code"></div>
          <h3 class="detail-name"></h3>
          <p class="detail-status"></p>
        </div>
      </div>
      <div class="gallery-strip"></div>
    </div>
  </template>

  <script type="module" src="./app.js"></script>
</body>
</html>
